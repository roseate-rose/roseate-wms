app = "roseate-wms"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////app/instance/wms.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "roseate_storage"
  destination = "/app/instance"

[vm]
  size = "shared-cpu-1x"
  memory = 256
